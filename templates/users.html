{% extends "base.html" %}
{% block title %}
Users
{% endblock %}
{% block page_title %}
Users
{% endblock %}
{% block content %}
<div class="d-flex justify-content-between mb-3">
    <h3>Users</h3>
    <a href="/add_user" class="btn btn-primary"><i class="bi bi-plus-circle"></i> New User</a>
</div>
<div class="card shadow">
    <div class="card-body">
        <table class="table table-bordered table-hover table-striped">
            <thead class="table-dark">
                <tr>
                    <th>ID</th>
                    <th>Username</th>
                    <th>Email</th>
                    <th>Role</th>
                    <th>Actions</th>
                </tr>
            </thead>
            <tbody>
            {% for user in users %}
                <tr>
                    <td>{{ user[0] }}</td>
                    <td>{{ user[1] }}</td>
                    <td>{{ user[2] }}</td>
                    <td>
                        <span class="badge bg-primary">{{ user[3] }} </span>
                    </td>
                    <td>
                        <a href="/edit_user/{{ user[0] }}"class="btn btn-warning btn-sm"><i class="bi bi-pencil"></i>Edit</a><a href="/delete_user/{{ user[0] }}"class="btn btn-danger btn-sm onclick="return confirm('Delete this user?')"><i class="bi bi-trash"></i>Delete</a>
                    </td>
                </tr>
            {% endfor %}
            </tbody>
        </table>
    </div>
</div>
{% endblock %}
