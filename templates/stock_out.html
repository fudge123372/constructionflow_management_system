{% extends "base.html" %}
{% block page_title %}
Stock Out
{% endblock %}
{% block content %}
<div class="card shadow">
    <div class="card-body">
        <form method="POST">
            <div class="mb-3">
                <label>Material</label>
                <select name="material_id" class="form-control">
                    {% for material in materials %}
                    <option value="{{ material[0] }}">
                        {{ material[1] }}
                    </option>
                    {% endfor %}
                </select>
            </div>
            <div class="mb-3">
                <label>Project</label>
                <select name="project_id" class="form-control">
                    {% for project in projects %}
                    <option value="{{ project[0] }}">
                        {{ project[1] }}
                    </option>
                    {% endfor %}
                </select>
            </div>
            <div class="mb-3">
                <label>Quantity</label>
                <input
                    type="number"
                    name="quantity"
                    class="form-control"
                    required>
            </div>
            <button class="btn btn-danger">
                Issue Material
            </button>
        </form>
    </div>
</div>
{% endblock %}
