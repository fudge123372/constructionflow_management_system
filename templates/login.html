{% extends "base.html" %}
{% block title %}Login{% endblock %}
{% block page_title %}Login{% endblock %}
{% block content %}
<div class="row justify-content-center">
<div class="col-md-5">
<div class="card shadow">
<div class="card-header bg-dark text-white">
<h3 class="text-center">
BuildTrack Login
</h3>
</div>
<div class="card-body">
<form method="POST">
<div class="mb-3">
<label>Username</label>
<input
type="text"
name="username"
class="form-control"
required>
</div>
<div class="mb-3">
<label>Password</label>
<input
type="password"
name="password"
class="form-control"
required>
</div>
<button class="btn btn-warning w-100">
Login
</button>
</form>
{% if error %}
<div class="alert alert-danger mt-3">
{{ error }}
</div>
{% endif %}
</div>
</div>
</div>
</div>
{% endblock %}
