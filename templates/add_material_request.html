{% extends "base.html" %}
{% block content %}
<h2>New Material Request</h2>
<form method="POST">
<div class="mb-3">
<label>Project</label>
<select name="project_id" class="form-control">
{% for project in projects %}
<option value="{{ project[0] }}">
{{ project[1] }}
</option>
{% endfor %}
</select>
</div>
<button class="btn btn-success">
Submit Request
</button>
</form>
{% endblock %}
