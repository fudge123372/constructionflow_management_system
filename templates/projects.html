<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>Projects</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body>
    <div class="container mt-5">
        <h2 class="mb-4">Projects</h2>
        <div class="d-flex justify-content-between mb-3">
            <a href="/add_project" class="btn btn-success">
                + Add Project
            </a>
            <form class="d-flex" method="GET">
                <input class="form-control me-2" type="text" name="search" placeholder="Search project">
                <button class="btn btn-primary">
                    Search
                </button>
            </form>
        </div>
        <table class="table table-bordered table-hover">
            <th width="180">Actions</th>
            <thead class="table-dark">
                <tr>
                    <th>ID</th>
                    <th>Project Name</th>
                    <th>Location</th>
                    <th>Budget</th>
                </tr>
            </thead>
            <tbody>
                {% for project in projects %}
                <tr>
                    <td>{{ project[0] }}</td>
                    <td>{{ project[1] }}</td>
                    <td>{{ project[2] }}</td>
                    <td>{{ project[3] }}</td>
                </tr>
                <td>
                    <a class="btn btn-warning btn-sm" href="/edit_project/{{ project[0] }}">
                        Edit
                    </a>
                    <a class="btn btn-danger btn-sm" href="/delete_project/{{ project[0] }}"
                        onclick="return confirm('Delete this project?')">
                        Delete
                    </a>
                </td>
                {% endfor %}
            </tbody>
        </table>
    </div>
</body>

</html>
