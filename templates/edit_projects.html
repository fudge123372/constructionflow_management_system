{% extends "base.html" %}
{% block title %}Edit Project{% endblock %}
{% block page_title %}Edit Project{% endblock %}
{% block content %}
<form method="POST">

    <div class="mb-3">
        <label>Project Name</label>
        <input
            type="text"
            name="project_name"
            class="form-control"
            value="{{ project[1] }}"
            readonly>
    </div>
    <div class="mb-3">
        <label>Location</label>
        <input
            type="text"
            name="location"
            class="form-control"
            value="{{ project[2] }}"
            readonly>
    </div>
    <div class="mb-3">
        <label>Budget</label>
        <input
            type="number"
            name="budget"
            class="form-control"
            value="{{ project[3] }}"
            required>
    </div>
    <button class="btn btn-primary">
        Update Project
    </button>
    <a href="/projects" class="btn btn-secondary">
        Cancel
    </a>
</form>
{% endblock %}
