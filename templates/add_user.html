{% extends "base.html" %}
{% block title %}
Add user
{% endblock %}
{% block page_title %}
Add user
{% endblock %}
{% block content %}
<div class="card shadow">
    <div class="card-body">
        <form method="POST">
            <div class="mb-3">
                <label>Username</label>
                <input type="text" name="username" class="form-control" required>
            </div>
            <div class="mb-3">
                <label>Email</label>
                <input type="email" name="email" class="form-control" required>
            </div>
            <div class="mb-3">
                <label>Password</label>
                <input type="password" name="password" class="form-control" required>
            </div>
            <div class="mb-3">
                <label>Role</label>
                <select name="role" class="form-control">
                    {% for role in roles %}
                    <option value="{{ role[1] }}">
                        {{ role[1] }}
                    </option>
                    {% endfor %}
                </select>
            </div>
            <button class="btn btn-success">
                Save User
            </button>
        </form>
    </div>
</div>
{% endblock %}
