{% extends "base.html" %}
{% block title %}Add Supplier{% endblock %}
{% block page_title %}Add Supplier{% endblock %}
{% block content %}
<form method="POST">
    <div class="mb-3">
        <label>Supplier Name</label>
        <input name="supplier_name" class="form-control" required>
    </div>
    <div class="mb-3">
        <label>Phone</label>
        <input name="phone" class="form-control" required>
    </div>
    <div class="mb-3">
        <label>Email</label>
        <input type="email" name="email" class="form-control">
    </div>
    <button class="btn btn-success">
        Save Supplier
    </button>
    <a href="/suppliers" class="btn btn-secondary">
        Cancel
    </a>
</form>
{% endblock %}
