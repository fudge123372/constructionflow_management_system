{% extends "base.html" %}
{% block page_title %}
Edit Payment
{% endblock %}
{% block content %}
<div class="card shadow">
    <div class="card-header bg-warning text-dark">
        <h4>Edit Payment</h4>
    </div>

    <div class="card-body">
        <form method="POST">

            <div class="mb-3">
                <label class="form-label">Payment Date</label>
                <input
                    type="date"
                    name="payment_date"
                    class="form-control"
                    value="{{ payment[2] }}"
                    required>
            </div>

            <div class="mb-3">
                <label class="form-label">Amount</label>
                <input
                    type="number"
                    step="0.01"
                    name="amount"
                    class="form-control"
                    value="{{ payment[3] }}"
                    required>
            </div>

            <div class="mb-3">
                <label class="form-label">Payment Method</label>
                <select
                    name="payment_method"
                    class="form-control">
                    <option value="Cash"
                        {% if payment[4]=="Cash" %}selected{% endif %}>
                        Cash
                    </option>
                    <option value="Bank Transfer"
                        {% if payment[4]=="Bank Transfer" %}selected{% endif %}>
                        Bank Transfer
                    </option>
                    <option value="Cheque"
                        {% if payment[4]=="Cheque" %}selected{% endif %}>
                        Cheque
                    </option>
                    <option value="Mobile Money"
                        {% if payment[4]=="Mobile Money" %}selected{% endif %}>
                        Mobile Money
                    </option>
                </select>
            </div>
            <div class="mb-3">
                <label class="form-label">Status</label>
                <select
                    name="status"
                    class="form-control">
                    <option value="Pending"
                        {% if payment[5]=="Pending" %}selected{% endif %}>
                        Pending
                    </option>
                    <option value="Approved"
                        {% if payment[5]=="Approved" %}selected{% endif %}>
                        Approved
                    </option>
                    <option value="Rejected"
                        {% if payment[5]=="Rejected" %}selected{% endif %}>
                        Rejected
                    </option>
                </select>
            </div>
            <button class="btn btn-success">
                <i class="bi bi-check-circle"></i>
                Save Changes
            </button>
            <a href="/payments" class="btn btn-secondary">
                Cancel
            </a>
        </form>
    </div>
</div>
{% endblock %}
