{% extends "base.html" %}
{% block page_title %}
Edit Payment
{% endblock %}
{% block content %}
<div class="card shadow">
    <div class="card-header bg-warning text-dark">
        <h4>Edit Payment</h4>
    </div>

    <div class="card-body">
        <form method="POST">

            <div class="mb-3">
                <label class="form-label">Payment Date</label>
                <input type="date" name="payment_date" class="form-control" max="{{ today }}" value="{{ payment[2] }}"
                    required>
            </div>

            <div class="mb-3">
                <label class="form-label">Amount</label>
                <input type="number" step="0.01" name="amount" class="form-control" value="{{ payment[3] }}" required>
            </div>
            <div class="mb-3">
                <label class="form-label">
                    Payment Method
                </label>
                <select name="payment_method" class="form-select" required>
                    <option value="">
                        Select Payment Method
                    </option>
                    <option value="Cash">
                        Cash
                    </option>
                    <option value="Bank Transfer">
                        Bank Transfer
                    </option>
                    <option value="Cheque">
                        Cheque
                    </option>
                    <option value="M-Pesa">
                        M-Pesa
                    </option>
                </select>
            </div>
            <div class="mt-4">
                <button class="btn btn-success">
                    <i class="bi bi-cash-stack"></i>
                    Save Payment
                </button>
                <a href="/payments" class="btn btn-secondary">
                    Cancel
                </a>
            </div>
            <a href="/payments" class="btn btn-secondary">
                Cancel
            </a>
        </form>
    </div>
</div>
{% endblock %}
