{% extends "base.html" %}
{% block page_title %}
Edit user
{% endblock %}
{% block content %}
<div class="card shadow">
    <div class="card-body">
        <form method="POST">
            <div class="mb-3">
                <label>Role</label>
                <select name="role" class="form-control">
                    {% for role in roles %}
                    <option value="{{ role[1] }}">
                        {{ role[1] }}
                    </option>
                    {% endfor %}
                </select>
                <button class="btn btn-success">
                    Update user
                </button>
            </div>
        </form>
    </div>
</div>
{% endblock %}
